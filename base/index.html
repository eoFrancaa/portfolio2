<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Portfólio</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Verdana, sans-serif;
        }

        html {
            background-color: #f0f0f0;
            color: #111;
            scroll-behavior: smooth;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            z-index: 100;
            background-color: rgba(240, 240, 240, 0.75);
            backdrop-filter: blur(10px);
        }

        header nav ul {
            display: flex;
            gap: 10px;
            padding: 6px 12px;
            border-radius: 50px;
            border: 2px solid #ddd;
            background-color: #fff;
            list-style: none;
        }

        header nav ul li a {
            display: block;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            color: #333;
            text-decoration: none;
            transition: 0.3s;
        }

        header nav ul li a.active {
            background-color: #111;
            color: #fff;
        }

        header nav ul li a:hover:not(.active) {
            background-color: #eee;
        }

        main {
            margin-top: 80px;
        }

        section {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .home-intro {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-bottom: 40px;
        }

        .home-intro h2 {
            font-size: 2.2rem;
            font-weight: normal;
        }

        .home-intro p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #333;
            max-width: 300px;
        }

        .grid-projetos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            position: relative;
            overflow: hidden;
        }

        .card p::before {
            content: "💡";
            display: block;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 1rem;
            margin-bottom: 12px;
        }

        .card .img-slot,
        .card img {
            width: 100%;
            border-radius: 6px;
            background-color: #fff;
            display: block;
            object-fit: cover;
        }

        .card .icon-slot {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 0.8rem;
            line-height: 1.5;
            color: #555;
            margin-bottom: 10px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            list-style: none;
            margin-top: 12px;
        }

        .tags li {
            background-color: #eee;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #444;
        }

        .home-footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            color: #999;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 6px;
        }

        #about {
            display: flex;
            gap: 40px;
        }

        #about h2,
        .projects-intro h2,
        .connect-intro h2 {
            font-size: 2rem;
            min-width: 150px;
        }

        #about p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #555;
        }

        .projects-intro {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }

        .projects-intro p {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #666;
        }

        .project-item {
            margin-bottom: 25px;
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #e0e0e0;
        }

        .project-item h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .project-item p {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 12px;
        }

        .project-item .img-slot,
        .project-item img {
            width: 100%;
            border-radius: 8px;
            background-color: #fff;
            display: block;
            object-fit: cover;
        }

        .connect-intro {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
        }

        .connect-intro p {
            font-size: 1rem;
            color: #555;
        }

        .connect-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            list-style: none;
        }

        .connect-list li {
            width: 48%;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            border-radius: 10px;
            border: 1.5px solid #ccc;
            background-color: #fff;
            color: #111;
            text-decoration: none;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .social-btn:hover {
            background-color: #f5f5f5;
            border-color: #888;
        }

        .social-btn i {
            font-size: 1.2rem;
            color: #333;
        }


        @media (max-width: 700px) {

            .home-intro,
            #about,
            .projects-intro,
            .connect-intro {
                flex-direction: column;
                gap: 15px;
            }

            #about h2,
            .projects-intro h2,
            .connect-intro h2 {
                min-width: auto;
            }

            .home-intro p {
                max-width: 100%;
            }

            .grid-projetos {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .connect-list li {
                width: 100%;
            }

            header nav ul li a {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="#home" class="nav-link active">Home</a></li>
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#projects" class="nav-link">Projects</a></li>
                <li><a href="#connect" class="nav-link">Connect</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- HOME -->
        

        <!-- ABOUT -->
       

        <!-- PROJECTS -->
        
        <!-- CONNECT -->
        
    </main>

    <script>
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            link.addEventListener('click', function () {
                document.querySelector('.nav-link.active').classList.remove('active');
                this.classList.add('active');
            });
        });
    </script>
</body>

</html>
